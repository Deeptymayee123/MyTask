<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz_Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <form action="quizGame">
      <section class="page" id="start-screen">
        <h2>Quiz Game</h2>
        <div class="start-container">
          <p>Let's Start the Quiz</p>
          <button id="startBtn">Start</button>
        </div>
      </section>
      <section class="page hidden" id="quiz-screen">
        <div class="questionContainer">
          <div class="timer">
            <h2 id="head">Questions</h2>
          </div>
          <div class="questionAndScore">
            <h2 class="question">Question1</h2>
            <div class="score">
              <div class="scoreValue">Score: 0</div>
              <div class="timeTaken">Time: 0s</div>
            </div>
          </div>
          <div class="options">
            <div class="btn" id="1">option1</div>
            <div class="btn" id="2">option2</div>
            <div class="btn" id="3">option3</div>
            <div class="btn" id="4">option4</div>
          </div>
        </div>
      </section>
      <section class="page hidden" id="result-screen">
        <p class="result"></p>
        <div class="questionScoreTimer">
          <ul class="set">
            <!-- <li class="task">
              <div class="group">
                <div class="qstn"></div>
                <div class="breakDownTimeTaken"></div>
                <div class="scoreTotal"></div>
              </div>
            </li> -->
          </ul>
        </div>
        <button class="restart">Restart</button>
      </section>
    </form>
    <script src="./script.js"></script>
  </body>
</html>
